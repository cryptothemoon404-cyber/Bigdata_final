version: "3.9"

services:

  # ── PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     techpulse
      POSTGRES_PASSWORD: techpulse
      POSTGRES_DB:       techpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      DATABASE_URL: postgresql://techpulse:techpulse@db:5432/techpulse_db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
